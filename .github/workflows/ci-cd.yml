name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-testing:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint
      continue-on-error: true # Evita que se trabe el pipeline si tenés un warning de linter

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 🚀 EJECUTAMOS TUS TESTS REALES
    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Playwright necesita saber a qué URL apuntar en el entorno virtual de GitHub
        PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
        NEXT_PUBLIC_POSTHOG_KEY: phc_mock_key_for_testing
        NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
        # Agregá acá tus variables de entorno si tus tests pegan a una base de datos real
        DATABASE_URL: ${{ secrets.DATABASE_URL }} 

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30